<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SC Tools v10 | Web Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121214; color: #E2E2E6; font-family: 'Google Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
        }
        .panel {
            background: #1A1A1E; padding: 32px; border-radius: 24px; width: 100%; max-width: 450px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #2A2A30;
        }
        .zone {
            border: 2px dashed #43474E; border-radius: 16px; padding: 24px; text-align: center;
            cursor: pointer; background: #222226; transition: 0.2s; margin-bottom: 20px;
        }
        .zone:hover { border-color: #a0c9ff; background: #262930; }
        button {
            width: 100%; height: 52px; border-radius: 26px; border: none; font-weight: 500;
            font-size: 15px; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-dec { background: #a0c9ff; color: #003258; }
        .btn-enc { background: #dfe2eb; color: #2a2a30; }
        .progress-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center; flex-direction: column;
        }
        .progress-box { background: #1A1A1E; padding: 32px; border-radius: 20px; text-align: center; width: 80%; max-width: 350px; }
        .bar { height: 6px; background: #333; border-radius: 3px; margin: 16px 0; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: #a0c9ff; transition: width 0.2s; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="margin-top:0; color:#a0c9ff;">SC Tools <span style="font-weight:300;color:#fff">v10</span></h2>
    
    <div class="zone" onclick="document.getElementById('fDec').click()">
        <span id="lDec">📄 Выбрать файл (.sc / .sctx)</span>
        <input type="file" id="fDec" hidden onchange="document.getElementById('lDec').innerText = this.files[0].name">
    </div>
    <button class="btn-dec" onclick="upload('decode', 'fDec')">РАСПАКОВАТЬ</button>

    <div style="margin: 32px 0; border-top: 1px solid #2A2A30;"></div>

    <div class="zone" onclick="document.getElementById('fEnc').click()">
        <span id="lEnc">📦 Выбрать собранный архив (.zip)</span>
        <input type="file" id="fEnc" accept=".zip" hidden onchange="document.getElementById('lEnc').innerText = this.files[0].name">
    </div>
    <button class="btn-enc" onclick="upload('encode', 'fEnc')">ЗАПАКОВАТЬ ОБРАТНО</button>
</div>

<div class="progress-overlay" id="overlay">
    <div class="progress-box">
        <h3 id="pPercent" style="margin:0; font-size:28px;">0%</h3>
        <div class="bar"><div class="fill" id="pFill"></div></div>
        <div id="pMsg" style="color:#8d9199; font-size:14px;">Ожидание...</div>
    </div>
</div>

<script>
function upload(mode, inputId) {
    const file = document.getElementById(inputId).files[0];
    if (!file) return alert("Пожалуйста, выберите файл.");
    
    document.getElementById('overlay').style.display = 'flex';
    const form = new FormData();
    form.append('file', file);

    fetch(mode === 'decode' ? '/upload_decode' : '/upload_encode', { method: 'POST', body: form })
        .then(r => r.json())
        .then(data => poll(data.task_id));
}

function poll(id) {
    const inter = setInterval(() => {
        fetch('/status/' + id)
            .then(r => r.json())
            .then(data => {
                document.getElementById('pMsg').innerText = data.message;
                document.getElementById('pPercent').innerText = data.percent + "%";
                document.getElementById('pFill').style.width = data.percent + "%";

                if (data.status === 'done') {
                    clearInterval(inter);
                    setTimeout(() => {
                        document.getElementById('overlay').style.display = 'none';
                        window.location.href = data.download_url;
                    }, 500);
                } else if (data.status === 'error') {
                    clearInterval(inter);
                    alert("Ошибка: " + data.message);
                    document.getElementById('overlay').style.display = 'none';
                }
            });
    }, 1000);
}
</script>
</body>
</html>
